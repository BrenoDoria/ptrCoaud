<script>

function erroCritico(mensagem) {
    const spinner = document.getElementById("spinner");
    const progressText = document.getElementById("progressText");
    if (spinner) spinner.style.display = "none";
    if (progressText) progressText.textContent = mensagem;
    alert(mensagem);
}

const CLIENT_ID = '286050228811-cv6vsd075480anb1i6auuc421enuaf8q.apps.googleusercontent.com';
const FILE_ID = '1q9RCwJ4P--QIH4kkMszffrN8ZwzkSsNoZtPH-Usk4Zw';

let tokenClient;
let accessToken = null;
let patrimonioData = [];
let patrimoniosSelecionados = [];
let fichaEditando = null;
let escalaData = [];

// ============================
// 🔐 EMAIL → ALMOXARIFADO
// ============================
const emailToNome = {
    "afonsoguitar@gmail.com": "Afonso Viana de Mesquita Filho",
    "altamiraraujo@gmail.com": "Altamir Araújo da Silva",
    "waleriasbastos@gmail.com": "Waleria Bastos Cardoso",
    "antonio.angelo.agenda@gmail.com": "Antonio Batista Ângelo",
    "breno.felicio@gmail.com": "Breno Doria Felicio"
};

// ============================
// 🔎 PEGA EMAIL GOOGLE
// ============================
async function getCurrentUserEmail() {
    if (!accessToken) return null;

    try {
        const response = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
            headers: { 'Authorization': `Bearer ${accessToken}` }
        });

        const userInfo = await response.json();
        return userInfo.email.toLowerCase();

    } catch (error) {
        console.error("Erro ao obter email:", error);
        return null;
    }
}

// ============================
// 🔒 BLOQUEIA ALMOXARIFADO
// ============================
async function autoPreencherAlmoxarifado() {
    const email = await getCurrentUserEmail();
    if (!email) return;

    const nome = emailToNome[email];
    const select = document.getElementById("operador2Select");

    if (nome) {
        select.value = nome;
        select.disabled = true;

        document.getElementById("progressText").textContent =
            `✅ Almoxarifado: ${nome}`;
    }
}

// ============================
// 🚀 LOAD
// ============================
window.onload = () => {

    tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/spreadsheets',
        callback: (tokenResponse) => {

            accessToken = tokenResponse.access_token;
            localStorage.setItem("access_token", accessToken);

            iniciarSistema();
        }
    });

    const savedToken = localStorage.getItem("access_token");

    if (savedToken) {
        accessToken = savedToken;
        iniciarSistema();
    } else {
        tokenClient.requestAccessToken();
    }
};

// ============================
// 🔄 INICIA SISTEMA
// ============================
function iniciarSistema() {

    document.getElementById("retirada-section").style.display = "block";
    document.getElementById("navegacao-fichas").style.display = "block";

    carregarPatrimoniosDoSheets();
    carregarEscalaDoSheets();

    autoPreencherAlmoxarifado();
}

// ============================
// 📦 CARREGAR PATRIMONIOS
// ============================
function carregarPatrimoniosDoSheets() {

    fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values/SIGMAS!A:D`, {
        headers: { 'Authorization': `Bearer ${accessToken}` }
    })
    .then(res => res.json())
    .then(data => {
        patrimonioData = data.values || [];
    })
    .catch(err => erroCritico(err.message));
}

// ============================
// 📅 CARREGAR ESCALA
// ============================
function carregarEscalaDoSheets() {

    fetch('https://sheets.googleapis.com/v4/spreadsheets/1smzyrRUnPZkfZGY-8EPDGg7Js8_6-nQ2xlpXgl8Orjw/values/escalaAudio!A:Z?key=AIzaSyA8yWyDVkekhaVdxCO7BuP3pjjjKTD-cDE')
    .then(res => res.json())
    .then(data => {
        escalaData = data.values.slice(1);
    })
    .catch(err => erroCritico(err.message));
}

// ============================
// 🎯 AUTO PREENCHIMENTO ESCALA
// ============================
function autoPreencherLocalEEvento() {

    const operador = document.getElementById("operador1Select").value.trim();

    const localInput = document.getElementById("localMontagemInput");
    const eventoInput = document.getElementById("eventoInput");

    localInput.value = "";
    eventoInput.value = "";

    if (!operador || operador === "Obrigatório") return;

    if (escalaData.length === 0) {
        document.getElementById("progressText").textContent =
            "Escala ainda não carregada...";
        return;
    }

    const row = escalaData.find(r => r[9] && r[9].trim() === operador);

    if (row) {
        localInput.value = (row[2] || "").trim();
        eventoInput.value = (row[6] || "").trim();

        document.getElementById("progressText").textContent =
            "📅 Dados preenchidos pela escala!";
    } else {
        document.getElementById("progressText").textContent =
            "Operador não está na escala hoje.";
    }
}

// ============================
// ➕ ADICIONAR NRP
// ============================
function adicionarNRP() {

    let nrp = document.getElementById("nrpInput").value.trim();
    nrp = nrp.replace(/^0+/, "");

    const encontrado = patrimonioData.find(
        row => row[0] && row[0].toString().replace(/^0+/, "") === nrp
    );

    if (encontrado) {

        patrimoniosSelecionados.push({
            NRP: encontrado[0],
            Material: encontrado[1],
            Localização: encontrado[2],
            Responsável: encontrado[3]
        });

        atualizarListaPatrimonios();
    }

    document.getElementById("nrpInput").value = "";
}

// ============================
// 📋 LISTA
// ============================
function atualizarListaPatrimonios() {

    const list = document.getElementById("patrimonioList");
    list.innerHTML = "";

    patrimoniosSelecionados.forEach((item, index) => {

        const row = document.createElement("tr");

        row.innerHTML = `
            <td>${item.NRP}</td>
            <td>${item.Material}</td>
            <td>${item.Localização}</td>
            <td>${item.Responsável}</td>
            <td><button onclick="removerPatrimonio(${index})">Remover</button></td>
        `;

        list.prepend(row);
    });
}

// ============================
// ❌ REMOVER
// ============================
function removerPatrimonio(index) {
    patrimoniosSelecionados.splice(index, 1);
    atualizarListaPatrimonios();
}

// ============================
// 💾 REGISTRAR
// ============================
async function registrarRetirada() {

    const operador1 = document.getElementById("operador1Select").value;
    const operador2 = document.getElementById("operador2Select").value;
    const local = document.getElementById("localMontagemInput").value;
    const evento = document.getElementById("eventoInput").value;

    if (!operador1 || !local || !evento || patrimoniosSelecionados.length === 0) {
        alert("Preencha tudo");
        return;
    }

    const equipamentos = patrimoniosSelecionados
        .map(i => `${i.NRP} - ${i.Material}`)
        .join("; ");

    const nova = [
        Date.now().toString(),
        operador1,
        operador2,
        equipamentos,
        local,
        evento,
        new Date().toLocaleString('pt-BR')
    ];

    await fetch(
        `https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values/RETIRADAS_PENDENTES!A:G:append?valueInputOption=RAW`,
        {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${accessToken}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ values: [nova] })
        }
    );

    alert("✅ Registrado!");

    patrimoniosSelecionados = [];
    atualizarListaPatrimonios();

    autoPreencherAlmoxarifado();
}

</script>
