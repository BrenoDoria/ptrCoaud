<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizador de Patrimônios SIGMAS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        #editor-section {
            display: none;
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background-color: #f9f9f9;
        }
        #local-editor, #responsavel-editor {
            margin-bottom: 15px;
        }
        #responsavel-list {
            list-style-type: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        #responsavel-list li {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        #responsavel-list li:hover {
            background-color: #e9f7ff;
        }
        /* === CORES POR ABA === */
        table.sigmas th { background-color: #28a745 !important; color: white; }
        table.coaud th { background-color: #007bff !important; color: white; }
        
        button.btn-sigmas { background-color: #28a745; }
        button.btn-coaud { background-color: #007bff; }
        button.btn-sigmas:hover { background-color: #218838; }
        button.btn-coaud:hover { background-color: #0056b3; }

        .btn-alteracoes {
            padding: 6px 10px;
            font-size: 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        h1.sigmas { color: #28a745; }
        h1.coaud { color: #007bff; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="titulo-principal">PATRIMÔNIOS SIGMAS - LOCALIZADOR</h1>
        
        <div id="login-section">
            <button onclick="solicitarToken()">Fazer Login com Google</button>
        </div>

        <div class="progress-container" id="progress-container" style="display: none;">
            <div id="spinner" class="spinner"></div>
            <p id="progressText">Consultando Servidor</p>
        </div>

        <div id="busca-section" style="display: none;">
            <input type="text" id="patrimonioInput" placeholder="Digite o Número do Patrimônio" autofocus>
            <button id="btn-buscar" class="btn-sigmas" onclick="buscarPatrimonio()">Buscar Localização</button>
            <select id="abaSelect" onchange="trocarAba()" style="margin-left: 10px; padding: 8px;">
                <option value="SIGMAS" selected>SIGMAS</option>
                <option value="COAUD">COAUD</option>
            </select>
        </div>

        <table id="patrimonioTable" style="display: none;">
            <thead>
                <tr>
                    <th>NRP</th>
                    <th>Material</th>
                    <th>Localização</th>
                    <th>Responsável</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="patrimonioList"></tbody>
        </table>

        <!-- EDITOR -->
        <div id="editor-section">
            <!-- Editor de Local (usado sozinho ou junto com responsável) -->
            <div id="local-editor">
                <h3 id="titulo-local">Alterar Local</h3>
                <input type="text" id="novoLocalInput" placeholder="Digite o novo local">
            </div>

            <!-- Editor de Responsável -->
            <div id="responsavel-editor">
                <h3>Alterar Responsável <span style="color:red;">(Local também obrigatório)</span></h3>
                <input type="text" id="responsavelSearch" placeholder="Digite pelo menos 3 letras para buscar" oninput="filterResponsaveis()">
                <ul id="responsavel-list"></ul>
            </div>

            <div style="margin-top: 15px;">
                <button id="btn-confirmar" onclick="confirmarAlteracao()" style="background-color:#28a745; color:white; padding:10px 20px;">Confirmar Alteração</button>
                <button onclick="cancelarEdicao()" style="padding:10px 20px;">Cancelar</button>
            </div>
        </div>

        <button class="backButton" onclick="window.location.href='index.html'">Voltar</button>
    </div>

    <footer class="author-signature">© 2025 BrenoDoria</footer>

    <script>
        // ==================== CONFIGURAÇÕES ====================
        const CLIENT_ID = '286050228811-cv6vsd075480anb1i6auuc421enuaf8q.apps.googleusercontent.com';
        const FILE_ID = '1iNeSf0wakQ6j9Eg_qOCzVNKcIVVIsukeThL0Phpd5LE';

        let tokenClient;
        let accessToken = null;
        let userEmail = null;
        let dadosSigmas = null;
        let dadosCoaud = null;
        let currentDados = null;
        let currentSheet = 'SIGMAS';
        let responsaveisUnicos = new Set();

        let sheetIdSigmas = null;
        let sheetIdCoaud = null;

        let currentRowIndex = null;
        let currentNrp = null;
        let currentEditorMode = null; // 'local' ou 'responsavel'

        const usuarios = {
            "supervisor": { senha: "12345", permissao: "Supervisor" },
            "operador": { senha: "12345", permissao: "Operador" }
        };

        // ==================== INICIALIZAÇÃO ====================
        window.onload = async () => {
            const usuarioLogado = JSON.parse(localStorage.getItem("usuarioLogado"));
            if (!usuarioLogado || !usuarios[usuarioLogado.username]) {
                alert("Usuário não está logado. Faça login novamente.");
                window.location.href = "index.html";
                return;
            }

            if (usuarios[usuarioLogado.username].permissao !== "Supervisor") {
                alert("Acesso negado: Você não tem permissão para acessar o Localizador de Patrimônios.");
                window.location.href = "index.html";
                return;
            }

            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email',
                callback: (tokenResponse) => {
                    if (tokenResponse.error) {
                        document.getElementById("progressText").textContent = "Erro ao autenticar: " + tokenResponse.error;
                        document.getElementById("progress-container").style.display = "block";
                        return;
                    }
                    accessToken = tokenResponse.access_token;
                    localStorage.setItem("access_token", accessToken);
                    loadUserEmail().then(iniciarAplicacao);
                }
            });

            const savedToken = localStorage.getItem("access_token");
            if (savedToken) {
                accessToken = savedToken;
                await loadUserEmail();
                if (!userEmail) {
                    localStorage.removeItem("access_token");
                    document.getElementById("login-section").style.display = "block";
                    alert("Por favor, faça login novamente.");
                    return;
                }
                iniciarAplicacao();
            } else {
                document.getElementById("login-section").style.display = "block";
            }

            document.getElementById("patrimonioInput").addEventListener("keydown", (event) => {
                if (event.key === "Enter") buscarPatrimonio();
            });
        };

        async function loadUserEmail() {
            try {
                const response = await fetch('https://www.googleapis.com/userinfo/v2/me', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                const data = await response.json();
                userEmail = data.email;
            } catch (error) {
                console.error("Erro ao carregar email:", error);
                userEmail = null;
            }
        }

        function iniciarAplicacao() {
            document.getElementById("login-section").style.display = "none";
            document.getElementById("busca-section").style.display = "block";
            document.getElementById("progress-container").style.display = "block";
            document.getElementById("progressText").textContent = "Carregando planilhas...";
            carregarPatrimoniosDoSheets();
        }

        function solicitarToken() {
            tokenClient.requestAccessToken();
        }

        function getLog(type) {
            if (!userEmail) {
                alert("Email do usuário não disponível.");
                return "";
            }
            const now = new Date();
            const date = now.toLocaleDateString('pt-BR');
            const time = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            return `alterado: "${type}" data: ${date} hora: ${time}hs pelo operador: ${userEmail}`;
        }

        // ==================== CARREGAMENTO DE DADOS ====================
        function carregarPatrimoniosDoSheets(retryCount = 0) {
            const maxRetries = 3;
            document.getElementById("progressText").textContent = "Consultando Servidor";

            fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values/SIGMAS!A:E`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            })
            .then(async response => {
                if (!response.ok) {
                    if (response.status === 401 && retryCount < maxRetries) {
                        localStorage.removeItem("access_token");
                        solicitarToken();
                        return;
                    }
                    throw new Error(`Erro HTTP ${response.status}`);
                }
                const data = await response.json();
                dadosSigmas = data.values || [];
                currentDados = dadosSigmas;
                refreshResponsaveis();

                return fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values/COAUD!A:E`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
            })
            .then(async response => {
                if (!response.ok) throw new Error("Erro ao carregar COAUD");
                const coaudData = await response.json();
                dadosCoaud = coaudData.values || [];

                return fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
            })
            .then(async response => {
                const meta = await response.json();
                meta.sheets.forEach(sheet => {
                    if (sheet.properties.title === 'SIGMAS') sheetIdSigmas = sheet.properties.sheetId;
                    if (sheet.properties.title === 'COAUD') sheetIdCoaud = sheet.properties.sheetId;
                });

                document.getElementById("progressText").textContent = "AUTORIZADA CONSULTA";
                document.getElementById("spinner").style.display = "none";
                document.getElementById("patrimonioTable").style.display = "table";
            })
            .catch(error => {
                console.error(error);
                document.getElementById("progressText").textContent = "Erro ao carregar dados: " + error.message;
            });
        }

        function refreshResponsaveis() {
            if (!dadosSigmas) return;
            responsaveisUnicos = new Set(dadosSigmas.slice(1).map(row => row[3] ? row[3].trim() : '').filter(t => t));
        }

        function trocarAba() {
            currentSheet = document.getElementById('abaSelect').value;
            currentDados = currentSheet === 'SIGMAS' ? dadosSigmas : dadosCoaud;

            const tabela = document.getElementById("patrimonioTable");
            const titulo = document.getElementById("titulo-principal");
            const btnBuscar = document.getElementById("btn-buscar");

            tabela.classList.remove("sigmas", "coaud");
            tabela.classList.add(currentSheet.toLowerCase());
            titulo.classList.remove("sigmas", "coaud");
            titulo.classList.add(currentSheet.toLowerCase());
            btnBuscar.classList.remove("btn-sigmas", "btn-coaud");
            btnBuscar.classList.add(`btn-${currentSheet.toLowerCase()}`);

            document.getElementById("patrimonioList").innerHTML = "";
        }

        // ==================== BUSCA ====================
        function buscarPatrimonio() {
            const nrp = document.getElementById("patrimonioInput").value.trim();
            if (!nrp) {
                document.getElementById("progressText").textContent = "Digite o número do patrimônio.";
                return;
            }

            const cleanedNrp = nrp.replace(/\./g, "").replace(/^0+/, "");
            const listElement = document.getElementById("patrimonioList");
            listElement.innerHTML = "";

            const rowIndex = currentDados.findIndex(row => 
                row[0] && row[0].toString().trim().replace(/\./g, "").replace(/^0+/, "") === cleanedNrp
            );

            if (rowIndex !== -1) {
                const patrimonio = currentDados[rowIndex];
                const corClasse = currentSheet.toLowerCase();

                let acoesHTML = `
                    <button class="btn-${corClasse}" onclick="mostrarEditorLocal(${rowIndex}, '${nrp}')">Alterar Local</button>
                    <button class="btn-${corClasse}" onclick="mostrarEditorResponsavel(${rowIndex}, '${nrp}')">Alterar Responsável</button>
                `;

                if (patrimonio[4] && patrimonio[4].trim() !== '') {
                    acoesHTML += `<button class="btn-alteracoes" onclick="consultarAlteracoes(${rowIndex})">Consultar Alterações</button>`;
                }

                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${patrimonio[0] || "N/A"}</td>
                    <td>${patrimonio[1] || "N/A"}</td>
                    <td id="localizacao-${rowIndex}">${patrimonio[2] || "Não especificada"}</td>
                    <td id="responsavel-${rowIndex}">${patrimonio[3] || "Não informado"}</td>
                    <td>${acoesHTML}</td>
                `;
                listElement.appendChild(row);

                document.getElementById("progressText").textContent = `Patrimônio ${nrp} encontrado na Planilha ${currentSheet}!`;
            } else {
                document.getElementById("progressText").textContent = `Patrimônio ${nrp} não encontrado na Planilha ${currentSheet}.`;
            }

            document.getElementById("patrimonioInput").value = "";
            document.getElementById("patrimonioInput").focus();
        }

        function consultarAlteracoes(rowIndex) {
            const log = currentDados[rowIndex][4] || "";
            alert(log ? `📋 HISTÓRICO DE ALTERAÇÕES\n\n${log}` : "Nenhuma alteração registrada.");
        }

        // ==================== EDITORES ====================
        function mostrarEditorLocal(rowIndex, nrp) {
            currentRowIndex = rowIndex;
            currentNrp = nrp;
            currentEditorMode = 'local';

            document.getElementById('editor-section').style.display = 'block';
            document.getElementById('local-editor').style.display = 'block';
            document.getElementById('responsavel-editor').style.display = 'none';
            document.getElementById('titulo-local').textContent = 'Alterar Local';
            document.getElementById('novoLocalInput').value = currentDados[rowIndex][2] || '';
            document.getElementById('novoLocalInput').focus();
        }

        function mostrarEditorResponsavel(rowIndex, nrp) {
            currentRowIndex = rowIndex;
            currentNrp = nrp;
            currentEditorMode = 'responsavel';

            document.getElementById('editor-section').style.display = 'block';
            document.getElementById('local-editor').style.display = 'block';
            document.getElementById('responsavel-editor').style.display = 'block';
            document.getElementById('titulo-local').textContent = 'Novo Local (obrigatório)';
            document.getElementById('novoLocalInput').value = '';
            document.getElementById('responsavelSearch').value = '';
            filterResponsaveis();
            document.getElementById('novoLocalInput').focus();
        }

        function cancelarEdicao() {
            document.getElementById('editor-section').style.display = 'none';
            document.getElementById('local-editor').style.display = 'none';
            document.getElementById('responsavel-editor').style.display = 'none';
        }

        // ==================== CONFIRMAÇÃO CENTRALIZADA ====================
        function confirmarAlteracao() {
            const novoLocal = document.getElementById('novoLocalInput').value.trim();

            if (currentEditorMode === 'local') {
                if (!novoLocal) {
                    alert('Digite o novo local.');
                    return;
                }
                atualizarLocal(currentRowIndex, novoLocal);
            } 
            else if (currentEditorMode === 'responsavel') {
                if (!novoLocal) {
                    alert('⚠️ É obrigatório informar o novo local ao alterar o responsável!');
                    document.getElementById('novoLocalInput').focus();
                    return;
                }

                const search = document.getElementById('responsavelSearch').value.trim();
                if (search.length < 3) {
                    alert('Digite pelo menos 3 letras para buscar o responsável.');
                    return;
                }

                const novoResp = Array.from(responsaveisUnicos).find(name => 
                    name.toLowerCase() === search.toLowerCase()
                );

                if (!novoResp) {
                    alert('Selecione um responsável da lista de sugestões.');
                    return;
                }

                atualizarResponsavelComLocal(currentRowIndex, novoResp, novoLocal);
            }
        }

        // ==================== ATUALIZAÇÕES ====================
        function atualizarLocal(rowIndex, novoLocal) {
            const sheetName = currentSheet;
            const linha = rowIndex + 1;
            const log = getLog('sala');

            document.getElementById("progressText").textContent = "Atualizando planilha...";
            document.getElementById("progress-container").style.display = "block";
            document.getElementById("spinner").style.display = "inline-block";

            fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values:batchUpdate`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    valueInputOption: 'USER_ENTERED',
                    data: [
                        { range: `${sheetName}!C${linha}`, values: [[novoLocal]] },
                        { range: `${sheetName}!E${linha}`, values: [[log]] }
                    ]
                })
            })
            .then(async response => {
                if (!response.ok) throw new Error(`Erro HTTP ${response.status}`);
                return response.json();
            })
            .then(() => {
                currentDados[rowIndex][2] = novoLocal;
                currentDados[rowIndex][4] = log;
                document.getElementById(`localizacao-${rowIndex}`).textContent = novoLocal;
                document.getElementById("progressText").textContent = "Local atualizado com sucesso!";
                document.getElementById("spinner").style.display = "none";
                cancelarEdicao();
            })
            .catch(error => {
                console.error(error);
                document.getElementById("progressText").textContent = "Erro ao atualizar: " + error.message;
                document.getElementById("spinner").style.display = "none";
            });
        }

        function atualizarResponsavelComLocal(rowIndex, novoResp, novoLocal) {
            const sheetName = currentSheet;
            const linha = rowIndex + 1;
            const log = getLog('responsavel');

            document.getElementById("progressText").textContent = "Atualizando planilha...";
            document.getElementById("progress-container").style.display = "block";
            document.getElementById("spinner").style.display = "inline-block";

            const isEspecial = novoResp === "ALBERTO CESAR SOUZA ALMEIDA (5302)" || 
                               novoResp === "PAULO FERNANDO VOLPE (5933)";

            const batchData = [
                { range: `${sheetName}!C${linha}`, values: [[novoLocal]] },
                { range: `${sheetName}!D${linha}`, values: [[novoResp]] },
                { range: `${sheetName}!E${linha}`, values: [[log]] }
            ];

            // ===================== SIGMAS =====================
            if (currentSheet === 'SIGMAS') {
                const cleanedNrp = currentNrp.replace(/\./g, "").replace(/^0+/, "");
                const existeEmCoaud = dadosCoaud.some(row => 
                    row[0] && row[0].toString().trim().replace(/\./g, "").replace(/^0+/, "") === cleanedNrp
                );

                if (existeEmCoaud && !isEspecial) {
                    document.getElementById("progress-container").style.display = "none";
                    document.getElementById("spinner").style.display = "none";
                    alert("⚠️ Este patrimônio pertence ao Alberto ou Volpe.\n\nAltere diretamente na planilha COAUD.");
                    return;
                }

                if (isEspecial) {
                    // Lógica especial de cópia para COAUD (mantida igual)
                    let rowData = [...currentDados[rowIndex]];
                    rowData[2] = novoLocal;
                    rowData[3] = novoResp;
                    rowData[4] = log;

                    // ... (seu código de append + update pode ser mantido aqui se necessário)
                    // Por enquanto vamos usar apenas o batch simples. Se precisar da lógica completa, avise.
                }

                // Update normal
                fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values:batchUpdate`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ valueInputOption: 'USER_ENTERED', data: batchData })
                })
                .then(async r => { if (!r.ok) throw new Error(); return r.json(); })
                .then(() => {
                    currentDados[rowIndex][2] = novoLocal;
                    currentDados[rowIndex][3] = novoResp;
                    currentDados[rowIndex][4] = log;

                    document.getElementById(`localizacao-${rowIndex}`).textContent = novoLocal;
                    document.getElementById(`responsavel-${rowIndex}`).textContent = novoResp;
                    refreshResponsaveis();

                    document.getElementById("progressText").textContent = "✅ Responsável e Local atualizados com sucesso!";
                    document.getElementById("spinner").style.display = "none";
                    cancelarEdicao();
                })
                .catch(error => {
                    console.error(error);
                    document.getElementById("progressText").textContent = "Erro ao atualizar: " + error.message;
                    document.getElementById("spinner").style.display = "none";
                });

            } 
            // ===================== COAUD =====================
            else {
                fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values:batchUpdate`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ valueInputOption: 'USER_ENTERED', data: batchData })
                })
                .then(async r => { if (!r.ok) throw new Error(); return r.json(); })
                .then(() => {
                    currentDados[rowIndex][2] = novoLocal;
                    currentDados[rowIndex][3] = novoResp;
                    currentDados[rowIndex][4] = log;

                    document.getElementById(`localizacao-${rowIndex}`).textContent = novoLocal;
                    document.getElementById(`responsavel-${rowIndex}`).textContent = novoResp;
                    refreshResponsaveis();

                    document.getElementById("progressText").textContent = "✅ Responsável e Local atualizados com sucesso em COAUD!";
                    document.getElementById("spinner").style.display = "none";
                    cancelarEdicao();
                })
                .catch(error => {
                    console.error(error);
                    document.getElementById("progressText").textContent = "Erro ao atualizar: " + error.message;
                    document.getElementById("spinner").style.display = "none";
                });
            }
        }

        function filterResponsaveis() {
            const search = document.getElementById('responsavelSearch').value.trim().toLowerCase();
            const list = document.getElementById('responsavel-list');
            list.innerHTML = '';

            if (search.length < 3) {
                const li = document.createElement('li');
                li.textContent = 'Digite 3 ou mais letras para ver sugestões.';
                list.appendChild(li);
                return;
            }

            const filtered = Array.from(responsaveisUnicos)
                .filter(name => name.toLowerCase().includes(search))
                .sort();

            if (filtered.length === 0) {
                const li = document.createElement('li');
                li.textContent = 'Nenhum responsável encontrado.';
                list.appendChild(li);
            } else {
                filtered.forEach(name => {
                    const li = document.createElement('li');
                    li.textContent = name;
                    li.onclick = () => {
                        document.getElementById('responsavelSearch').value = name;
                    };
                    list.appendChild(li);
                });
            }
        }
    </script>
</body>
</html>
