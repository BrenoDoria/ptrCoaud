<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Fichas Arquivadas - Controle de Almoxarifado COAUD</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --font-size-base: 1rem;
            --padding-base: 1.25rem;
            --margin-base: 1.25rem;
        }
        .container {
            text-align: center;
            padding: var(--padding-base);
            max-width: 90%;
            margin: 0 auto;
        }
        h1 {
            font-size: calc(var(--font-size-base) * 1.5);
            margin-bottom: calc(var(--margin-base) * 0.8);
        }
        h2 {
            font-size: calc(var(--font-size-base) * 1.25);
            margin-top: calc(var(--margin-base) * 1.2);
        }
        .progress-container {
            margin: calc(var(--margin-base) * 0.4) 0;
        }
        .spinner {
            display: none;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 1.25rem;
            height: 1.25rem;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        button {
            padding: 0.5rem 1rem;
            margin: 0.3rem;
            cursor: pointer;
            min-height: 2.75rem;
            font-size: var(--font-size-base);
            touch-action: manipulation;
        }
        .backButton {
            background: #ccc;
        }
        input[type="text"] {
            padding: 0.5rem;
            margin: 0.3rem;
            width: 80%;
            max-width: 12.5rem;
            font-size: calc(var(--font-size-base) * 0.9);
            min-height: 2.75rem;
        }
        .table-wrapper {
            margin-top: calc(var(--margin-base) * 0.8);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
        }
        th, td {
            padding: 0.625rem;
            text-align: center;
            border: 1px solid #ddd;
            vertical-align: middle;
            font-size: calc(var(--font-size-base) * 0.9);
        }
        th {
            background: #4CAF50;
            color: white;
            font-weight: bold;
        }
        td {
            background: white;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        tr:nth-child(even) td {
            background: #f2f2f2;
        }
        th:nth-child(2), td:nth-child(2) { width: 90px; }  /* ID */
        th:nth-child(3), td:nth-child(3) { width: 120px; } /* Retirado */
        th:nth-child(6), td:nth-child(6) { width: 100px; } /* Local */
        th:nth-child(7), td:nth-child(7) { width: 140px; } /* Evento */
        th:nth-child(8), td:nth-child(8),
        th:nth-child(9), td:nth-child(9) { width: 130px; } /* Datas */
        th:nth-child(10), td:nth-child(10),
        th:nth-child(11), td:nth-child(11) { width: 130px; } /* Devolvido/Recebido */
        .equipamentos-cell {
            text-align: left;
            padding: 0.625rem;
            white-space: normal;
            word-break: break-word;
            overflow-wrap: break-word;
            max-width: 400px;
        }
        .equipamento-item {
            white-space: normal;
            word-break: break-word;
            overflow-wrap: break-word;
            line-height: 1.5;
        }
        footer {
            text-align: center;
            margin-top: calc(var(--margin-base) * 0.8);
            font-size: calc(var(--font-size-base) * 0.75);
        }
        @media (max-width: 768px) {
            :root {
                --font-size-base: 0.9rem;
                --padding-base: 0.8rem;
                --margin-base: 0.8rem;
            }
            th, td {
                padding: 0.4rem;
            }
            input[type="text"] {
                width: 90%;
            }
        }
        @media (max-width: 480px) {
            :root {
                --font-size-base: 0.8rem;
                --padding-base: 0.5rem;
                --margin-base: 0.5rem;
            }
            th, td {
                padding: 0.3rem;
                font-size: calc(var(--font-size-base) * 0.8);
            }
            button {
                padding: 0.4rem 0.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>FICHAS ARQUIVADAS - ALMOXARIFADO COAUD</h1>
        <div id="login-section">
            <button onclick="solicitarToken()">Fazer Login com Google</button>
        </div>
        <div class="progress-container" id="progress-container" style="display: none;">
            <div id="spinner" class="spinner"></div>
            <p id="progressText">Aguardando dados do Google Sheets...</p>
        </div>
        <div id="busca-section" style="display: none;">
            <h2>Consultar Histórico por Patrimônio (NRP)</h2>
            <div>
                <label>Patrimônio (NRP):</label>
                <input type="text" id="nrpBuscaInput" placeholder="Digite o NRP (ex.: 414591)" onkeypress="if(event.key === 'Enter') buscarPorNRP()">
                <button onclick="buscarPorNRP()">Buscar</button>
                <button onclick="limparBusca()">Limpar Busca</button>
            </div>
        </div>
        <div>
            <button class="backButton" onclick="window.location.href='index-almoxarifado.html'">Voltar</button>
            <button id="imprimirSelecionadas" onclick="imprimirFichasSelecionadas()" style="display: none;">Imprimir Selecionadas</button>
        </div>
        <div id="arquivadas-section" style="display: none;">
            <h2>Fichas Arquivadas</h2>
            <div class="table-wrapper">
                <table id="arquivadasTable">
                    <thead>
                        <tr>
                            <th><input type="checkbox" id="selectAll" onclick="toggleSelectAll()"></th>
                            <th>ID Ficha</th>
                            <th>Retirado por</th>
                            <th>Entregue por</th>
                            <th>Equipamentos</th>
                            <th>Local</th>
                            <th>Evento</th>
                            <th>Data Retirada</th>
                            <th>Data Devolução</th>
                            <th>Devolvido por</th>
                            <th>Recebido por</th>
                        </tr>
                    </thead>
                    <tbody id="arquivadasList"></tbody>
                </table>
            </div>
        </div>
    </div>
    <footer class="author-signature">© 2024 BrenoDoria</footer>
    <script>
        const usuarios = {
            "supervisor": { senha: "12345", permissao: "Supervisor" },
            "operador": { senha: "12345", permissao: "Operador" }
        };
        const CLIENT_ID = '286050228811-cv6vsd075480anb1i6auuc421enuaf8q.apps.googleusercontent.com';
        const FILE_ID = '1q9RCwJ4P--QIH4kkMszffrN8ZwzkSsNoZtPH-Usk4Zw';
        let tokenClient;
        let accessToken = null;
        let arquivadasData = [];
        let arquivadasFiltradas = [];
        window.onload = () => {
            const usuarioLogado = JSON.parse(localStorage.getItem("usuarioLogado"));
            if (!usuarioLogado || !usuarios[usuarioLogado.username]) {
                alert("Usuário não está logado. Faça login novamente.");
                window.location.href = "index.html";
                return;
            }
            if (usuarios[usuarioLogado.username].permissao !== "Supervisor") {
                alert("Acesso negado: Você não tem permissão para acessar o Controle de Almoxarifado.");
                window.location.href = "index.html";
                return;
            }
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/spreadsheets',
                callback: (tokenResponse) => {
                    if (tokenResponse.error) {
                        document.getElementById("progressText").textContent = "Erro ao autenticar: " + tokenResponse.error;
                        document.getElementById("progress-container").style.display = "block";
                        return;
                    }
                    accessToken = tokenResponse.access_token;
                    localStorage.setItem("access_token", accessToken);
                    document.getElementById("progressText").textContent = "Autenticado com sucesso! Carregando dados...";
                    document.getElementById("progress-container").style.display = "block";
                    document.getElementById("login-section").style.display = "none";
                    document.getElementById("busca-section").style.display = "block";
                    document.getElementById("arquivadas-section").style.display = "block";
                    carregarDadosDoSheets();
                }
            });
            const savedToken = localStorage.getItem("access_token");
            if (savedToken) {
                accessToken = savedToken;
                document.getElementById("login-section").style.display = "none";
                document.getElementById("busca-section").style.display = "block";
                document.getElementById("arquivadas-section").style.display = "block";
                document.getElementById("progress-container").style.display = "block";
                document.getElementById("progressText").textContent = "Usando token salvo. Carregando dados...";
                carregarDadosDoSheets();
            }
        };
        function solicitarToken() {
            tokenClient.requestAccessToken();
        }
        async function carregarDadosDoSheets(retryCount = 0) {
            const maxRetries = 3;
            document.getElementById("spinner").style.display = "inline-block";
            document.getElementById("progressText").textContent = "Consultando Google Sheets...";
            try {
                const arquivadasResponse = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values/RETIRADAS_ARQUIVADAS!A:J`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                if (!arquivadasResponse.ok) {
                    const errorData = await arquivadasResponse.json();
                    throw new Error(`Erro ao carregar RETIRADAS_ARQUIVADAS: ${errorData.error?.message || arquivadasResponse.statusText}`);
                }
                const arquivadas = await arquivadasResponse.json();
                arquivadasData = arquivadas.values || [];
                arquivadasFiltradas = arquivadasData.slice();
                document.getElementById("progressText").textContent = "Dados carregados com sucesso!";
                document.getElementById("spinner").style.display = "none";
                atualizarTabelaArquivadas();
            } catch (error) {
                if (error.message.includes("401") && retryCount < maxRetries) {
                    document.getElementById("progressText").textContent = "Token expirado, reautenticando...";
                    localStorage.removeItem("access_token");
                    accessToken = null;
                    document.getElementById("login-section").style.display = "block";
                    document.getElementById("busca-section").style.display = "none";
                    document.getElementById("arquivadas-section").style.display = "none";
                    solicitarToken();
                    return;
                }
                console.error("Erro ao carregar dados:", error);
                document.getElementById("progressText").textContent = "Erro ao carregar os dados: " + error.message;
                document.getElementById("spinner").style.display = "none";
            }
        }
        function atualizarTabelaArquivadas() {
            const arquivadasList = document.getElementById("arquivadasList");
            arquivadasList.innerHTML = "";
            document.getElementById("selectAll").checked = false;

            if (arquivadasFiltradas.length > 1) {
                // === ALTERAÇÃO SOLICITADA (ÚNICA MUDANÇA FEITA NO CÓDIGO) ===
                // Agora guardamos o índice ORIGINAL de cada linha dentro de arquivadasFiltradas
                // antes de ordenar. Assim o checkbox data-index sempre aponta para a linha correta,
                // mesmo quando a tabela está ordenada por Data Devolução (mais recente em cima).
                // Isso corrige o problema de imprimir a ficha antiga ao selecionar uma recente.

                const dataRowsWithIndex = arquivadasFiltradas.slice(1).map((row, idx) => ({
                    row: row,
                    originalIndex: idx + 1
                }));

                // Ordena por Data Devolução (decrescente) – mantido exatamente como antes
                dataRowsWithIndex.sort((a, b) => {
                    const parseDate = (dateStr) => {
                        if (!dateStr) return new Date(0);
                        const [datePart, timePart] = dateStr.split(', ');
                        const [day, month, year] = datePart.split('/').map(Number);
                        const [hours, minutes, seconds] = timePart.split(':').map(Number);
                        return new Date(year, month - 1, day, hours, minutes, seconds);
                    };
                    const dateA = parseDate(a.row[7]);
                    const dateB = parseDate(b.row[7]);
                    return dateB - dateA;
                });

                // Popula a tabela usando o índice ORIGINAL
                dataRowsWithIndex.forEach(({ row, originalIndex }) => {
                    const equipamentos = row[3] ? row[3].split('; ') : [];
                    const equipamentosFormatados = equipamentos.length > 0
                        ? equipamentos.map(equip => `<div class="equipamento-item">${equip}</div>`).join('')
                        : '-';

                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td><input type="checkbox" class="ficha-checkbox" data-index="${originalIndex}"></td>
                        <td>${row[0]}</td>
                        <td>${row[1]}</td>
                        <td>${row[2] || '-'}</td>
                        <td class="equipamentos-cell">${equipamentosFormatados}</td>
                        <td>${row[4]}</td>
                        <td>${row[5]}</td>
                        <td>${row[6]}</td>
                        <td>${row[7]}</td>
                        <td>${row[8] || '-'}</td>
                        <td>${row[9] || '-'}</td>
                    `;
                    arquivadasList.appendChild(tr);
                });

                document.getElementById("imprimirSelecionadas").style.display = "inline-block";
            } else {
                document.getElementById("imprimirSelecionadas").style.display = "none";
            }
        }
        function toggleSelectAll() {
            const selectAll = document.getElementById("selectAll");
            const checkboxes = document.querySelectorAll(".ficha-checkbox");
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAll.checked;
            });
        }
        function imprimirFichasSelecionadas() {
            const checkboxes = document.querySelectorAll(".ficha-checkbox:checked");
            if (checkboxes.length === 0) {
                document.getElementById("progressText").textContent = "Selecione pelo menos uma ficha para imprimir.";
                return;
            }
            const fichasSelecionadas = Array.from(checkboxes).map(checkbox => {
                const index = parseInt(checkbox.getAttribute("data-index"));
                const row = arquivadasFiltradas[index];
                return {
                    idFicha: row[0],
                    operador1: row[1],
                    operador2: row[2] || '-',
                    equipamentos: row[3] ? row[3].split('; ') : [],
                    local: row[4],
                    evento: row[5],
                    dataRetirada: row[6],
                    dataDevolucao: row[7],
                    operadorDevolucao: row[8] || '-',
                    almoxarifadoDevolucao: row[9] || '-'
                };
            });
            localStorage.setItem('fichasParaImprimir', JSON.stringify(fichasSelecionadas));
            window.location.href = 'imprimir-arquivadas.html';
        }
        function buscarPorNRP() {
            const nrp = document.getElementById("nrpBuscaInput").value.trim();
            if (!nrp) {
                document.getElementById("progressText").textContent = "Digite um NRP para buscar.";
                return;
            }
            const nrpNormalizado = nrp.replace(/\./g, "").replace(/^0+/, "");
            arquivadasFiltradas = [arquivadasData[0]];
            const fichasFiltradas = arquivadasData.slice(1).filter(row => {
                const equipamentos = row[3] || "";
                return equipamentos.split("; ").some(equip => {
                    const nrpEquip = equip.split(" - ")[0].replace(/^0+/, "");
                    return nrpEquip === nrpNormalizado;
                });
            });
            if (fichasFiltradas.length === 0) {
                document.getElementById("progressText").textContent = `Nenhuma ficha arquivada encontrada para o NRP ${nrp}.`;
            } else {
                document.getElementById("progressText").textContent = `Encontradas ${fichasFiltradas.length} fichas para o NRP ${nrp}.`;
                arquivadasFiltradas.push(...fichasFiltradas);
            }
            atualizarTabelaArquivadas();
        }
        function limparBusca() {
            document.getElementById("nrpBuscaInput").value = "";
            arquivadasFiltradas = arquivadasData.slice();
            document.getElementById("progressText").textContent = "Busca limpa. Exibindo todas as fichas arquivadas.";
            atualizarTabelaArquivadas();
        }
        // ─── SISTEMA DE INATIVIDADE: redireciona para index após 5 min sem ação ───
(function() {
    const TEMPO_INATIVIDADE_MS = 5 * 60 * 1000; // 5 minutos
    const PAGINA_DESTINO = 'index-almoxarifado.html';
    const AVISO_ANTECEDENCIA_MS = 30 * 1000; // avisa 30s antes

    let timerRedirecionar = null;
    let timerAviso = null;
    let elementoAviso = null;
    let pausado = false;

    function criarElementoAviso() {
        const div = document.createElement('div');
        div.id = 'aviso-inatividade';
        div.style.cssText = `
            display: none;
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: #fff;
            padding: 12px 18px;
            border-radius: 8px;
            font-size: 13px;
            z-index: 9999;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            max-width: 280px;
            line-height: 1.5;
        `;
        div.innerHTML = `
            ⏱️ Redirecionando em <strong id="aviso-contador">30</strong>s por inatividade.
            <br><span onclick="window.pausarInatividade()" 
                style="text-decoration:underline;cursor:pointer;color:#7dd;">
                Continuar aqui
            </span>
        `;
        document.body.appendChild(div);
        return div;
    }

    function mostrarAviso(segundosRestantes) {
        if (!elementoAviso) elementoAviso = criarElementoAviso();
        elementoAviso.style.display = 'block';
        let conta = segundosRestantes;
        const intervalo = setInterval(() => {
            conta--;
            const el = document.getElementById('aviso-contador');
            if (el) el.textContent = conta;
            if (conta <= 0) clearInterval(intervalo);
        }, 1000);
        // guarda referência para limpar se o usuário agir
        elementoAviso._intervalo = intervalo;
    }

    function esconderAviso() {
        if (!elementoAviso) return;
        elementoAviso.style.display = 'none';
        if (elementoAviso._intervalo) {
            clearInterval(elementoAviso._intervalo);
            elementoAviso._intervalo = null;
        }
    }

    function resetarTimer() {
        if (pausado) return;

        clearTimeout(timerRedirecionar);
        clearTimeout(timerAviso);
        esconderAviso();

        // Agenda o aviso 30s antes do redirecionamento
        timerAviso = setTimeout(() => {
            mostrarAviso(30);
        }, TEMPO_INATIVIDADE_MS - AVISO_ANTECEDENCIA_MS);

        // Agenda o redirecionamento
        timerRedirecionar = setTimeout(() => {
            window.location.href = PAGINA_DESTINO;
        }, TEMPO_INATIVIDADE_MS);
    }

    // Expõe função para o botão "Continuar aqui" pausar o sistema
    window.pausarInatividade = function() {
        pausado = true;
        clearTimeout(timerRedirecionar);
        clearTimeout(timerAviso);
        esconderAviso();
        // Fica pausado — só volta a contar se o usuário chamar resumirInatividade()
        // ou recarregar a página
    };

    // Eventos que reiniciam o contador
    const EVENTOS = ['mousemove', 'mousedown', 'keydown', 'scroll', 'touchstart', 'click', 'wheel'];
    EVENTOS.forEach(evento => {
        document.addEventListener(evento, resetarTimer, { passive: true });
    });

    // Inicia o timer assim que a página carregar
    resetarTimer();
})();
        // ─── PAUSA AUTOMÁTICA se houver fichas selecionadas para imprimir ──────────
(function() {
    // Observa mudanças nos checkboxes — se algum estiver marcado, pausa
    document.addEventListener('change', function(e) {
        if (e.target && e.target.classList.contains('ficha-checkbox')) {
            const algumMarcado = document.querySelectorAll('.ficha-checkbox:checked').length > 0;
            const selectAll = document.getElementById('selectAll');
            const selectAllMarcado = selectAll && selectAll.checked;

            if (algumMarcado || selectAllMarcado) {
                // Pausa a contagem enquanto há seleção ativa
                if (typeof window.pausarInatividade === 'function') {
                    window.pausarInatividade();
                }
            } else {
                // Todos desmarcados: retoma a contagem
                // Recria o timer reiniciando o módulo de inatividade via evento artificial
                document.dispatchEvent(new Event('mousemove'));
            }
        }
        // Mesma lógica para o "selecionar todos"
        if (e.target && e.target.id === 'selectAll') {
            if (e.target.checked) {
                if (typeof window.pausarInatividade === 'function') {
                    window.pausarInatividade();
                }
            } else {
                document.dispatchEvent(new Event('mousemove'));
            }
        }
    });
})();
    </script>
</body>
</html>
