<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizador de Patrimônios SIGMAS</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        #editor-section, #novo-patrimonio-form { display: none; margin-top: 20px; }
        #local-editor, #responsavel-editor { display: none; }
        #responsavel-list, #novo-responsavel-list {
            list-style-type: none; padding: 0; max-height: 200px; overflow-y: auto;
        }
        #responsavel-list li, #novo-responsavel-list li {
            padding: 8px; cursor: pointer; border-bottom: 1px solid #ccc;
        }
        #responsavel-list li:hover, #novo-responsavel-list li:hover { background-color: #eee; }

        table.sigmas th { background-color: #28a745 !important; color: white; }
        table.coaud th { background-color: #007bff !important; color: white; }
        button.btn-sigmas { background-color: #28a745; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        button.btn-coaud { background-color: #007bff; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; }
        button.btn-sigmas:hover { background-color: #218838; }
        button.btn-coaud:hover { background-color: #0056b3; }
        .btn-alteracoes { padding: 6px 10px; font-size: 12px; border-radius: 4px; cursor: pointer; }
        table.sigmas .btn-alteracoes { background-color: #28a745; }
        table.coaud .btn-alteracoes { background-color: #007bff; }
        h1.sigmas { color: #28a745; }
        h1.coaud { color: #007bff; }
        @media (max-width: 600px) { .container { padding: 10px; } table { font-size: 12px; } }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="titulo-principal">PATRIMÔNIOS SIGMAS - LOCALIZADOR</h1>

        <!-- LOGIN GOOGLE -->
        <div id="login-section">
            <button onclick="solicitarToken()">Fazer Login com Google</button>
        </div>

        <!-- PROGRESS -->
        <div class="progress-container" id="progress-container" style="display: none;">
            <div id="spinner" class="spinner"></div>
            <p id="progressText">Consultando Servidor</p>
        </div>

        <!-- BUSCA + ADICIONAR -->
        <div id="busca-section" style="display: none;">
            <input type="text" id="patrimonioInput" placeholder="Digite o Número do Patrimônio" autofocus>
            <button id="btn-buscar" class="btn-sigmas" onclick="buscarPatrimonio()">Buscar Localização</button>
            <button id="btn-adicionar" class="btn-sigmas" onclick="mostrarFormularioNovoPatrimonio()" style="margin-left:10px;">+ Adicionar Novo Patrimônio</button>
            <select id="abaSelect" onchange="trocarAba()" style="margin-left:10px; padding:8px;">
                <option value="SIGMAS" selected>SIGMAS</option>
                <option value="COAUD">COAUD</option>
            </select>
        </div>

        <table id="patrimonioTable" style="display: none;">
            <thead>
                <tr>
                    <th>NRP</th>
                    <th>Material</th>
                    <th>Localização</th>
                    <th>Responsável</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="patrimonioList"></tbody>
        </table>

        <!-- EDITOR ALTERAÇÃO -->
        <div id="editor-section">
            <div id="local-editor">
                <h3>Alterar Local</h3>
                <input type="text" id="novoLocalInput" placeholder="Digite o novo local">
                <button onclick="confirmarNovoLocal()">Confirmar</button>
                <button onclick="cancelarEdicao()">Cancelar</button>
            </div>
            <div id="responsavel-editor">
                <h3>Alterar Responsável e Local</h3>
                <p><strong>Responsável:</strong></p>
                <input type="text" id="responsavelSearch" placeholder="Digite pelo menos 3 letras" oninput="filterResponsaveis()">
                <ul id="responsavel-list"></ul>
                <p><strong>Novo Local (OBRIGATÓRIO):</strong></p>
                <input type="text" id="novoLocalRespInput" placeholder="Digite o novo local">
                <button onclick="confirmarAlteracaoResponsavel()">Confirmar Alteração</button>
                <button onclick="cancelarEdicao()">Cancelar</button>
            </div>
        </div>

        <!-- NOVO PATRIMÔNIO -->
        <div id="novo-patrimonio-form">
            <h3>Adicionar Novo Patrimônio</h3>
            <input type="text" id="novoNrpInput" placeholder="NRP" style="width:100%;margin-bottom:8px;">
            <input type="text" id="novoMaterialInput" placeholder="Material" style="width:100%;margin-bottom:8px;">
            <input type="text" id="novoLocalInputAdd" placeholder="Localização" style="width:100%;margin-bottom:8px;">

            <p><strong>Responsável:</strong></p>
            <input type="text" id="novoResponsavelSearch" placeholder="Digite pelo menos 3 letras para buscar" oninput="filterNovoResponsaveis()">
            <ul id="novo-responsavel-list"></ul>

            <button onclick="confirmarNovoPatrimonio()" class="btn-sigmas">Adicionar Patrimônio</button>
            <button onclick="cancelarNovoPatrimonio()">Cancelar</button>
        </div>

        <button class="backButton" onclick="window.location.href='index.html'">Voltar</button>
    </div>
    <footer class="author-signature">© 2025 BrenoDoria</footer>

    <script>
        const usuarios = {
            "supervisor": { senha: "12345", permissao: "Supervisor" },
            "operador": { senha: "12345", permissao: "Operador" }
        };

        const CLIENT_ID = '286050228811-cv6vsd075480anb1i6auuc421enuaf8q.apps.googleusercontent.com';
        const FILE_ID = '1iNeSf0wakQ6j9Eg_qOCzVNKcIVVIsukeThL0Phpd5LE';

        let tokenClient;
        let accessToken = null;
        let userEmail = null;
        let dadosSigmas = null;
        let dadosCoaud = null;
        let currentDados = null;
        let currentSheet = 'SIGMAS';
        let responsaveisUnicos = new Set();
        let sheetIdSigmas = null;
        let sheetIdCoaud = null;
        let currentRowIndex = null;
        let currentNrp = null;
        let selectedNovoResponsavel = null;
        let selectedResponsavelNovo = null;

        window.onload = async () => {
            const usuarioLogado = JSON.parse(localStorage.getItem("usuarioLogado"));
            if (!usuarioLogado || !usuarios[usuarioLogado.username] || usuarios[usuarioLogado.username].permissao !== "Supervisor") {
                alert("Acesso negado. Faça login novamente.");
                window.location.href = "index.html";
                return;
            }

            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email',
                callback: (tokenResponse) => {
                    if (tokenResponse.error) {
                        document.getElementById("progressText").textContent = "Erro ao autenticar: " + tokenResponse.error;
                        document.getElementById("progress-container").style.display = "block";
                        return;
                    }
                    accessToken = tokenResponse.access_token;
                    localStorage.setItem("access_token", accessToken);

                    loadUserEmail().then(() => {
                        if (userEmail) {
                            document.getElementById("login-section").style.display = "none";
                            document.getElementById("busca-section").style.display = "block";
                            document.getElementById("progress-container").style.display = "block";
                            document.getElementById("progressText").textContent = "Autenticado com sucesso! Carregando dados...";
                            carregarPatrimoniosDoSheets();
                        }
                    });
                }
            });

            // === CORREÇÃO PRINCIPAL: se já tem token salvo, esconde o botão de login imediatamente ===
            const savedToken = localStorage.getItem("access_token");
            if (savedToken) {
                accessToken = savedToken;
                await loadUserEmail();

                if (userEmail) {
                    // Esconde o botão de login e mostra a área de busca
                    document.getElementById("login-section").style.display = "none";
                    document.getElementById("busca-section").style.display = "block";
                    document.getElementById("progress-container").style.display = "block";
                    document.getElementById("progressText").textContent = "Usando token salvo. Carregando dados...";
                    carregarPatrimoniosDoSheets();
                } else {
                    // Token inválido → limpa e mostra login
                    localStorage.removeItem("access_token");
                    document.getElementById("login-section").style.display = "block";
                }
            } else {
                document.getElementById("login-section").style.display = "block";
            }

            document.getElementById("patrimonioInput").addEventListener("keydown", e => {
                if (e.key === "Enter") buscarPatrimonio();
            });
        };

        function solicitarToken() {
            tokenClient.requestAccessToken();
        }

        async function loadUserEmail() {
            try {
                const response = await fetch('https://www.googleapis.com/userinfo/v2/me', {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                if (!response.ok) throw new Error('Falha ao buscar email');
                const data = await response.json();
                userEmail = data.email;
            } catch (error) {
                console.error("Erro ao carregar email:", error);
                userEmail = null;
            }
        }

        function refreshResponsaveis() {
            if (!dadosSigmas) return;
            responsaveisUnicos = new Set(dadosSigmas.slice(1).map(row => row[3] ? row[3].trim() : '').filter(Boolean));
        }

        function getLog(type) {
            if (!userEmail) return "";
            const now = new Date();
            const date = now.toLocaleDateString('pt-BR');
            const time = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            return `alterado: "${type}" data: ${date} hora: ${time}hs pelo operador: ${userEmail}`;
        }

        function getLogAdicionado() {
            if (!userEmail) return "";
            const now = new Date();
            const date = now.toLocaleDateString('pt-BR');
            const time = now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            return `adicionado: data: ${date} hora: ${time}hs pelo operador: ${userEmail}`;
        }

        function trocarAba() {
            currentSheet = document.getElementById('abaSelect').value;
            currentDados = currentSheet === 'SIGMAS' ? dadosSigmas : dadosCoaud;

            const tabela = document.getElementById("patrimonioTable");
            const titulo = document.getElementById("titulo-principal");
            tabela.classList.remove("sigmas", "coaud"); tabela.classList.add(currentSheet.toLowerCase());
            titulo.classList.remove("sigmas", "coaud"); titulo.classList.add(currentSheet.toLowerCase());

            const btnBuscar = document.getElementById("btn-buscar");
            const btnAdd = document.getElementById("btn-adicionar");
            btnBuscar.classList.remove("btn-sigmas", "btn-coaud");
            btnAdd.classList.remove("btn-sigmas", "btn-coaud");
            btnBuscar.classList.add(`btn-${currentSheet.toLowerCase()}`);
            btnAdd.classList.add(`btn-${currentSheet.toLowerCase()}`);
        }

        function carregarPatrimoniosDoSheets(retryCount = 0) {
            const maxRetries = 3;
            document.getElementById("spinner").style.display = "inline-block";
            document.getElementById("progressText").textContent = "Consultando Servidor";

            fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values/SIGMAS!A:E`, {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            })
            .then(async response => {
                if (!response.ok) {
                    if (response.status === 401 && retryCount < maxRetries) {
                        localStorage.removeItem("access_token");
                        document.getElementById("login-section").style.display = "block";
                        document.getElementById("busca-section").style.display = "none";
                        document.getElementById("progress-container").style.display = "none";
                        solicitarToken();
                        return;
                    }
                    throw new Error(`Erro HTTP ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                dadosSigmas = data.values || [];
                currentDados = dadosSigmas;
                refreshResponsaveis();
                return fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values/COAUD!A:E`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
            })
            .then(async response => {
                if (!response.ok) throw new Error("Erro ao carregar COAUD");
                const coaudData = await response.json();
                dadosCoaud = coaudData.values || [];
                return fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
            })
            .then(async response => {
                const meta = await response.json();
                meta.sheets.forEach(sheet => {
                    if (sheet.properties.title === 'SIGMAS') sheetIdSigmas = sheet.properties.sheetId;
                    if (sheet.properties.title === 'COAUD') sheetIdCoaud = sheet.properties.sheetId;
                });
                document.getElementById("patrimonioTable").classList.add("sigmas");
                document.getElementById("titulo-principal").classList.add("sigmas");
                document.getElementById("btn-buscar").classList.add("btn-sigmas");
                document.getElementById("btn-adicionar").classList.add("btn-sigmas");
                document.getElementById("progressText").textContent = "AUTORIZADA CONSULTA";
                document.getElementById("spinner").style.display = "none";
                document.getElementById("patrimonioTable").style.display = "table";
            })
            .catch(error => {
                console.error(error);
                document.getElementById("progressText").textContent = "Erro ao carregar os dados";
                document.getElementById("spinner").style.display = "none";
            });
        }

        function buscarPatrimonio() {
            const nrp = document.getElementById("patrimonioInput").value.trim();
            if (!nrp) return;
            const cleanedNrp = nrp.replace(/\./g, "").replace(/^0+/, "");
            const listElement = document.getElementById("patrimonioList");
            listElement.innerHTML = "";

            const rowIndex = currentDados.findIndex(row => 
                row[0] && row[0].toString().trim().replace(/\./g, "").replace(/^0+/, "") === cleanedNrp
            );

            if (rowIndex !== -1) {
                const row = currentDados[rowIndex];
                const corClasse = currentSheet.toLowerCase();
                let acoesHTML = `
                    <button class="btn-${corClasse}" onclick="mostrarEditorLocal(${rowIndex}, '${nrp}')">Alterar Local</button>
                    <button class="btn-${corClasse}" onclick="mostrarEditorResponsavel(${rowIndex}, '${nrp}')">Alterar Responsável</button>
                `;
                if (row[4]) acoesHTML += `<button class="btn-alteracoes" onclick="consultarAlteracoes(${rowIndex})">Consultar Alterações</button>`;

                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${row[0]}</td>
                    <td>${row[1]}</td>
                    <td id="localizacao-${rowIndex}">${row[2] || "Não especificada"}</td>
                    <td id="responsavel-${rowIndex}">${row[3] || "Não informado"}</td>
                    <td>${acoesHTML}</td>
                `;
                listElement.appendChild(tr);
            } else {
                document.getElementById("progressText").textContent = `Patrimônio ${nrp} não encontrado.`;
            }
        }

        function consultarAlteracoes(rowIndex) {
            const log = currentDados[rowIndex][4] || "";
            if (!log) return alert("Nenhuma alteração registrada.");
            alert(`📋 HISTÓRICO DE ALTERAÇÕES\n\n${log}`);
        }

        function mostrarEditorLocal(rowIndex, nrp) {
            currentRowIndex = rowIndex; currentNrp = nrp;
            document.getElementById('editor-section').style.display = 'block';
            document.getElementById('local-editor').style.display = 'block';
            document.getElementById('responsavel-editor').style.display = 'none';
            document.getElementById('novoLocalInput').value = '';
            document.getElementById('novoLocalInput').focus();
        }

        function mostrarEditorResponsavel(rowIndex, nrp) {
            currentRowIndex = rowIndex; currentNrp = nrp;
            document.getElementById('editor-section').style.display = 'block';
            document.getElementById('local-editor').style.display = 'none';
            document.getElementById('responsavel-editor').style.display = 'block';
            document.getElementById('responsavelSearch').value = '';
            selectedNovoResponsavel = null;
            document.getElementById('novoLocalRespInput').value = '';
            filterResponsaveis();
            document.getElementById('responsavelSearch').focus();
        }

        function cancelarEdicao() {
            document.getElementById('editor-section').style.display = 'none';
            document.getElementById('local-editor').style.display = 'none';
            document.getElementById('responsavel-editor').style.display = 'none';
        }

        function confirmarNovoLocal() {
            const novoLocal = document.getElementById('novoLocalInput').value.trim();
            if (novoLocal) {
                atualizarLocal(currentRowIndex, novoLocal);
                cancelarEdicao();
            }
        }

        function confirmarAlteracaoResponsavel() {
            const novoResp = selectedNovoResponsavel;
            const novoLocal = document.getElementById('novoLocalRespInput').value.trim();
            if (!novoResp) return alert('Selecione um responsável');
            if (!novoLocal) return alert('Novo Local é obrigatório');
            atualizarResponsavel(currentRowIndex, novoResp, currentNrp, novoLocal);
            cancelarEdicao();
        }

        function atualizarLocal(rowIndex, novoLocal) {
            const sheetName = currentSheet;
            const linha = rowIndex + 1;
            const log = getLog('sala');
            document.getElementById("progressText").textContent = "Atualizando...";
            document.getElementById("progress-container").style.display = "block";

            fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values:batchUpdate`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    valueInputOption: 'USER_ENTERED',
                    data: [
                        { range: `${sheetName}!C${linha}`, values: [[novoLocal]] },
                        { range: `${sheetName}!E${linha}`, values: [[log]] }
                    ]
                })
            }).then(() => {
                currentDados[rowIndex][2] = novoLocal;
                currentDados[rowIndex][4] = log;
                document.getElementById(`localizacao-${rowIndex}`).textContent = novoLocal;
                document.getElementById("progressText").textContent = "Local atualizado!";
                document.getElementById("progress-container").style.display = "none";
            });
        }

        function filterResponsaveis() {
            const search = document.getElementById('responsavelSearch').value.trim().toLowerCase();
            const list = document.getElementById('responsavel-list');
            list.innerHTML = '';
            if (search.length < 3) return list.innerHTML = '<li>Digite 3 ou mais letras...</li>';
            const filtered = Array.from(responsaveisUnicos).filter(n => n.toLowerCase().includes(search)).sort();
            filtered.forEach(name => {
                const li = document.createElement('li');
                li.textContent = name;
                li.onclick = () => { selectedNovoResponsavel = name; document.getElementById('responsavelSearch').value = name; };
                list.appendChild(li);
            });
        }

        function atualizarResponsavel(rowIndex, novoResp, nrp, novoLocal) {
            document.getElementById("progressText").textContent = "Atualizando planilha...";
            document.getElementById("progress-container").style.display = "block";
            document.getElementById("spinner").style.display = "inline-block";

            const log = getLog('responsavel');
            if (!log) return;

            const isEspecial = novoResp === "ALBERTO CESAR SOUZA ALMEIDA (5302)" || novoResp === "PAULO FERNANDO VOLPE (5933)";

            if (currentSheet === 'SIGMAS') {
                const cleanedNrp = nrp.replace(/\./g, "").replace(/^0+/, "");
                const existeEmCoaud = dadosCoaud.some(row =>
                    row[0] && row[0].toString().trim().replace(/\./g, "").replace(/^0+/, "") === cleanedNrp
                );

                if (existeEmCoaud && !isEspecial) {
                    document.getElementById("progress-container").style.display = "none";
                    document.getElementById("spinner").style.display = "none";
                    alert("⚠️ Este patrimônio pertence ao Alberto ou Volpe e está registrado na Planilha COAUD.\n\nPara alterar, faça diretamente na Planilha COAUD.");
                    return;
                }

                if (isEspecial) {
                    let rowData = [...currentDados[rowIndex]];
                    rowData[2] = novoLocal;
                    rowData[3] = novoResp;
                    rowData[4] = log;

                    fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values/COAUD!A1:append?valueInputOption=USER_ENTERED`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ values: [rowData] })
                    })
                    .then(() => {
                        const linha = rowIndex + 1;
                        return fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values:batchUpdate`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                valueInputOption: 'USER_ENTERED',
                                data: [
                                    { range: `SIGMAS!C${linha}`, values: [[novoLocal]] },
                                    { range: `SIGMAS!D${linha}`, values: [[novoResp]] },
                                    { range: `SIGMAS!E${linha}`, values: [[log]] }
                                ]
                            })
                        });
                    })
                    .then(() => {
                        currentDados[rowIndex][2] = novoLocal;
                        currentDados[rowIndex][3] = novoResp;
                        currentDados[rowIndex][4] = log;
                        document.getElementById(`localizacao-${rowIndex}`).textContent = novoLocal;
                        document.getElementById(`responsavel-${rowIndex}`).textContent = novoResp;
                        refreshResponsaveis();
                        document.getElementById("progressText").textContent = `✅ Responsável e Local atualizados! Patrimônio copiado para COAUD.`;
                        document.getElementById("spinner").style.display = "none";
                    })
                    .catch(error => {
                        console.error(error);
                        document.getElementById("progressText").textContent = "Erro ao atualizar: " + error.message;
                        document.getElementById("spinner").style.display = "none";
                    });
                } else {
                    const linha = rowIndex + 1;
                    fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values:batchUpdate`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            valueInputOption: 'USER_ENTERED',
                            data: [
                                { range: `SIGMAS!C${linha}`, values: [[novoLocal]] },
                                { range: `SIGMAS!D${linha}`, values: [[novoResp]] },
                                { range: `SIGMAS!E${linha}`, values: [[log]] }
                            ]
                        })
                    })
                    .then(() => {
                        currentDados[rowIndex][2] = novoLocal;
                        currentDados[rowIndex][3] = novoResp;
                        currentDados[rowIndex][4] = log;
                        document.getElementById(`localizacao-${rowIndex}`).textContent = novoLocal;
                        document.getElementById(`responsavel-${rowIndex}`).textContent = novoResp;
                        refreshResponsaveis();
                        document.getElementById("progressText").textContent = "✅ Responsável e Local atualizados com sucesso!";
                        document.getElementById("spinner").style.display = "none";
                    })
                    .catch(error => {
                        console.error(error);
                        document.getElementById("progressText").textContent = "Erro ao atualizar: " + error.message;
                        document.getElementById("spinner").style.display = "none";
                    });
                }
            } else {
                if (isEspecial) {
                    const linha = rowIndex + 1;
                    fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values:batchUpdate`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            valueInputOption: 'USER_ENTERED',
                            data: [
                                { range: `COAUD!C${linha}`, values: [[novoLocal]] },
                                { range: `COAUD!D${linha}`, values: [[novoResp]] },
                                { range: `COAUD!E${linha}`, values: [[log]] }
                            ]
                        })
                    })
                    .then(() => {
                        currentDados[rowIndex][2] = novoLocal;
                        currentDados[rowIndex][3] = novoResp;
                        currentDados[rowIndex][4] = log;
                        document.getElementById(`localizacao-${rowIndex}`).textContent = novoLocal;
                        document.getElementById(`responsavel-${rowIndex}`).textContent = novoResp;
                        refreshResponsaveis();
                        document.getElementById("progressText").textContent = "✅ Responsável e Local atualizados em COAUD!";
                        document.getElementById("spinner").style.display = "none";
                    })
                    .catch(error => {
                        console.error(error);
                        document.getElementById("progressText").textContent = "Erro ao atualizar: " + error.message;
                        document.getElementById("spinner").style.display = "none";
                    });
                } else {
                    const cleanedNrp = nrp.replace(/\./g, "").replace(/^0+/, "");
                    const sigmasRowIndex = dadosSigmas.findIndex(row =>
                        row[0] && row[0].toString().trim().replace(/\./g, "").replace(/^0+/, "") === cleanedNrp
                    );
                    if (sigmasRowIndex === -1) {
                        document.getElementById("progressText").textContent = "Patrimônio não encontrado na SIGMAS!";
                        document.getElementById("spinner").style.display = "none";
                        return;
                    }

                    fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}:batchUpdate`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            requests: [{
                                deleteDimension: {
                                    range: {
                                        sheetId: sheetIdCoaud,
                                        dimension: 'ROWS',
                                        startIndex: rowIndex,
                                        endIndex: rowIndex + 1
                                    }
                                }
                            }]
                        })
                    })
                    .then(() => {
                        const linhaSigmas = sigmasRowIndex + 1;
                        return fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values:batchUpdate`, {
                            method: 'POST',
                            headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                valueInputOption: 'USER_ENTERED',
                                data: [
                                    { range: `SIGMAS!C${linhaSigmas}`, values: [[novoLocal]] },
                                    { range: `SIGMAS!D${linhaSigmas}`, values: [[novoResp]] },
                                    { range: `SIGMAS!E${linhaSigmas}`, values: [[log]] }
                                ]
                            })
                        });
                    })
                    .then(() => {
                        dadosSigmas[sigmasRowIndex][2] = novoLocal;
                        dadosSigmas[sigmasRowIndex][3] = novoResp;
                        dadosSigmas[sigmasRowIndex][4] = log;
                        currentDados.splice(rowIndex, 1);
                        refreshResponsaveis();
                        document.getElementById("patrimonioList").innerHTML = '';
                        document.getElementById("progressText").textContent = `✅ Patrimônio removido da COAUD e atualizado em SIGMAS!`;
                        document.getElementById("spinner").style.display = "none";
                    })
                    .catch(error => {
                        console.error(error);
                        document.getElementById("progressText").textContent = "Erro ao atualizar: " + error.message;
                        document.getElementById("spinner").style.display = "none";
                    });
                }
            }
        }

        function mostrarFormularioNovoPatrimonio() {
            document.getElementById('novo-patrimonio-form').style.display = 'block';
            document.getElementById('novoNrpInput').focus();
            selectedResponsavelNovo = null;
            document.getElementById('novoResponsavelSearch').value = '';
            document.getElementById('novo-responsavel-list').innerHTML = '';
        }

        function cancelarNovoPatrimonio() {
            document.getElementById('novo-patrimonio-form').style.display = 'none';
        }

        function filterNovoResponsaveis() {
            const search = document.getElementById('novoResponsavelSearch').value.trim().toLowerCase();
            const list = document.getElementById('novo-responsavel-list');
            list.innerHTML = '';
            if (search.length < 3) return list.innerHTML = '<li>Digite 3 ou mais letras...</li>';
            const filtered = Array.from(responsaveisUnicos).filter(n => n.toLowerCase().includes(search)).sort();
            filtered.forEach(name => {
                const li = document.createElement('li');
                li.textContent = name;
                li.onclick = () => {
                    selectedResponsavelNovo = name;
                    document.getElementById('novoResponsavelSearch').value = name;
                };
                list.appendChild(li);
            });
        }

        async function confirmarNovoPatrimonio() {
            const nrp = document.getElementById('novoNrpInput').value.trim();
            const material = document.getElementById('novoMaterialInput').value.trim();
            const local = document.getElementById('novoLocalInputAdd').value.trim();
            const resp = selectedResponsavelNovo;

            if (!nrp || !material || !local || !resp) {
                alert('❌ Preencha todos os campos e selecione um responsável.');
                return;
            }

            const isEspecial = resp === "ALBERTO CESAR SOUZA ALMEIDA (5302)" || resp === "PAULO FERNANDO VOLPE (5933)";
            const log = getLogAdicionado();
            const rowData = [nrp, material, local, resp, log];

            document.getElementById("progressText").textContent = "Adicionando patrimônio...";
            document.getElementById("progress-container").style.display = "block";
            document.getElementById("spinner").style.display = "inline-block";

            try {
                await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values/SIGMAS!A1:append?valueInputOption=USER_ENTERED`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ values: [rowData] })
                });
                dadosSigmas.push(rowData);

                if (isEspecial) {
                    await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${FILE_ID}/values/COAUD!A1:append?valueInputOption=USER_ENTERED`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({ values: [rowData] })
                    });
                    dadosCoaud.push(rowData);
                }

                refreshResponsaveis();

                document.getElementById("progressText").textContent = `✅ Patrimônio ${nrp} adicionado com sucesso!`;
                setTimeout(() => {
                    document.getElementById("progress-container").style.display = "none";
                    document.getElementById("spinner").style.display = "none";
                    cancelarNovoPatrimonio();
                    document.getElementById('novoNrpInput').value = '';
                    document.getElementById('novoMaterialInput').value = '';
                    document.getElementById('novoLocalInputAdd').value = '';
                    document.getElementById('novoResponsavelSearch').value = '';
                }, 1500);
            } catch (err) {
                console.error(err);
                document.getElementById("progressText").textContent = "Erro ao adicionar";
            }
        }
    </script>
</body>
</html>
